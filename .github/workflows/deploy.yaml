name: Build & Deploy Moments

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'moments-prod' || 'moments-dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            backend/pnpm-lock.yaml

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        working-directory: frontend
        run: |
          export VITE_APP_TITLE="${{ vars.VITE_APP_TITLE }}"
          export VITE_APP_KEYWORD="${{ vars.VITE_APP_KEYWORD }}"
          export VITE_APP_DESPRICTION="${{ vars.VITE_APP_DESPRICTION }}"
          export VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}"
          pnpm build

      - name: Install Backend Dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build Backend
        working-directory: backend
        run: pnpm build

      - name: Prepare Docker Deploy Package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package

          cp deploy/Dockerfile deploy-package/Dockerfile
          cp deploy/docker-compose.yml deploy-package/docker-compose.yml

          cp backend/package.json deploy-package/package.json
          cp backend/pnpm-lock.yaml deploy-package/pnpm-lock.yaml
          cp backend/pnpm-workspace.yaml deploy-package/pnpm-workspace.yaml
          cp -r backend/dist deploy-package/dist
          cp -r backend/prisma deploy-package/prisma

          mkdir -p deploy-package/public
          cp -r frontend/dist/* deploy-package/public/

          cat > deploy-package/.env <<'APP_ENV_EOF'
          ${{ secrets.APP_ENV_FILE }}
          APP_ENV_EOF

          cat > deploy-package/.env.compose <<EOF
          APP_CONTAINER_NAME=${{ vars.APP_CONTAINER_NAME }}
          APP_PORT=${{ vars.APP_PORT }}
          EOF

      - name: Prepare Server Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            test -n "$DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH"
            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy-package/*,deploy-package/.env,deploy-package/.env.compose"
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy Docker Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ vars.DEPLOY_PATH }}"
            docker compose -f docker-compose.yml --env-file .env.compose build --pull app
            docker compose -f docker-compose.yml --env-file .env.compose up -d app
            docker image prune -f
